name: Sync Etsy Listings

on:
  schedule:
    # Runs hourly, at minute 0
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pynacl

      - name: Sync Etsy listings into index.html
        env:
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
          ETSY_SHARED_SECRET: ${{ secrets.ETSY_SHARED_SECRET }}
          ETSY_REFRESH_TOKEN: ${{ secrets.ETSY_REFRESH_TOKEN }}
          ETSY_SHOP_ID: ${{ secrets.ETSY_SHOP_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/sync_etsy.py

      - name: Commit and push if index.html changed
        run: |
          git config user.name "etsy-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "Auto-sync: update listings from Etsy"
            git push
          else
            echo "No listing changes this run."
          fi
